name: BPS LMS Admin Test Deployment

on:
  push:
    branches: ["host-testing"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install and build frontend assets
        run: |
          npm install
          npm run build

      - name: Commit built assets back to branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PATH_TEST }}@github.com/TyronBech/BPS-LMS-Admin.git
          git add public/build -f
          git diff --staged --quiet || git commit -m "chore: build frontend assets [skip ci]"
          git push origin host-testing

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST_TEST }}
          username: ${{ secrets.SFTP_USERNAME_TEST }}
          key: ${{ secrets.SFTP_PRIVATE_KEY_TEST }}
          port: ${{ secrets.SFTP_PORT_TEST }}
          script: |
            echo "Starting deployment..."

            cd ${{ secrets.SFTP_DIR_TEST }}

            echo "Setting GitHub remote with PAT..."
            export GIT_TERMINAL_PROMPT=0
            git -c credential.helper='' remote set-url origin https://x-access-token:${{ secrets.GH_PATH_TEST }}@github.com/TyronBech/BPS-LMS-Admin.git

            echo "Fetching latest code..."
            git -c credential.helper='' fetch origin

            echo "Resetting to latest commit..."
            git reset --hard origin/host-testing

            echo "Installing composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "Clearing OPcache via HTTP..."
            echo "<?php opcache_reset();" > public/opcache-reset.php
            curl -s https://${{ secrets.SFTP_URL_TEST }}/opcache-reset.php || echo "OPcache reset failed, continuing..."
            rm -f public/opcache-reset.php

            echo "Clearing all Laravel caches..."
            php artisan optimize:clear

            echo "Rebuilding caches..."
            php artisan optimize
            php artisan view:cache

            echo "Fixing permissions..."
            chmod -R 775 storage bootstrap/cache

            echo "Deployment completed successfully."
