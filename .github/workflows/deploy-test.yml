name: BPS LMS Admin Test Deployment

on:
  push:
    branches: ["host-testing"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST_TEST }}
          username: ${{ secrets.SFTP_USERNAME_TEST }}
          key: ${{ secrets.SFTP_PRIVATE_KEY_TEST }}
          port: ${{ secrets.SFTP_PORT_TEST }}
          script: |
            echo "Starting deployment..."

            cd ${{ secrets.SFTP_DIR_TEST }}

            echo "Fetching latest code..."
            git fetch origin

            echo "Resetting to latest commit..."
            git reset --hard origin/host-testing

            echo "Installing composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "Installing npm dependencies..."
            npm install

            echo "Building frontend assets..."
            npm run build

            echo "Clearing caches..."
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear

            echo "Rebuilding caches..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "Fixing permissions..."
            chmod -R 775 storage bootstrap/cache

            echo "Deployment completed successfully."
