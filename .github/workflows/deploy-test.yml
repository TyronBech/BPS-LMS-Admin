name: BPS LMS Admin Test Deployment

on:
  push:
    branches: ["host-testing"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, sqlite, pdo_sqlite, intl, bcmath

      # Install Composer Dependencies
      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-scripts

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install NPM Dependencies & Build Assets
      - name: Install NPM dependencies and build assets
        run: |
          npm install
          npm run build

      # Clean Laravel Cache Before Packaging
      - name: Prepare Laravel for testing deployment
        run: |
          php artisan config:clear || true
          php artisan route:clear || true
          php artisan view:clear || true

      # Upload Files to Testing Server (SFTP)
      - name: Deploy files to testing server via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SFTP_HOST_TEST }}
          username: ${{ secrets.SFTP_USERNAME_TEST }}
          key: ${{ secrets.SFTP_PRIVATE_KEY_TEST }}
          port: ${{ secrets.SFTP_PORT_TEST }}
          source: |
            ./
            !.git/
            !node_modules/
            !tests/
            !.github/
          target: ${{ secrets.SFTP_DIR_TEST }}
          overwrite: true

      # Optimize Laravel on Server
      - name: Run Laravel optimization commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST_TEST }}
          username: ${{ secrets.SFTP_USERNAME_TEST }}
          key: ${{ secrets.SFTP_PRIVATE_KEY_TEST }}
          port: ${{ secrets.SFTP_PORT_TEST }}
          script: |
            cd ${{ secrets.SFTP_DIR_TEST }}
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
