name: BPS LibraSync Admin Test Deployment

on:
  push:
    branches: [ "host-testing" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, sqlite, pdo_sqlite, intl, bcmath

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-scripts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install NPM dependencies and build assets
        run: |
          npm install
          npm run build

      - name: Create deployment archive
        run: |
          tar -czf deploy.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='deploy.tar.gz' \
            .

      - name: Upload archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SFTP_HOST_TEST }}
          username: ${{ secrets.SFTP_USERNAME_TEST }}
          key: ${{ secrets.SFTP_PRIVATE_KEY_TEST }}
          port: ${{ secrets.SFTP_PORT_TEST }}
          source: deploy.tar.gz
          target: ${{ secrets.SFTP_DIR_TEST }}

      - name: Extract and finalize deployment on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST_TEST }}
          username: ${{ secrets.SFTP_USERNAME_TEST }}
          key: ${{ secrets.SFTP_PRIVATE_KEY_TEST }}
          port: ${{ secrets.SFTP_PORT_TEST }}
          script: |
            set -e

            DEPLOY_PATH="${{ secrets.SFTP_DIR_TEST }}"

            cd "$DEPLOY_PATH"

            # Extract archive over existing files and clean up
            tar -xzf deploy.tar.gz
            rm -f deploy.tar.gz

            # Ensure storage and cache directories exist with correct permissions
            mkdir -p storage/framework/{sessions,views,cache}
            mkdir -p bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            # Build Laravel caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Restart queue workers (if applicable)
            php artisan queue:restart

            echo "Deployment successful."
